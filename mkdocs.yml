      - Tier 1 — Stone & materials: recipes/stone.md
      - Tier 2 — Metal Ages: recipes/metal-ages.md
      - Tier 3–4 — Steam & Steel: recipes/steam-steel.md
      - Tier 5 — Electric & chemistry: recipes/electric.md
      - Fabrication & components: recipes/fabrication.md
  - Items & Ores:
