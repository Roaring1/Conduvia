      - Tier 0 — Survival: items/tier-0-survival.md
      - Tier 0 — Wildlife: items/tier-0-wildlife-hunting.md
      - Tier 1 — Stone: items/tier-1-stone.md
      - Tier 2 — Metal Ages: items/tier-2-metal-ages.md
      - Tier 3 — Steam: items/tier-3-steam.md
      - Tier 4 — Steel & DC: items/tier-4-steel-dc.md
      - Tier 5 — Electric: items/tier-5-electric-chemistry.md
      - Tier 6 — Solid State: items/tier-6-solid-state.md
      - Tier 7 — Space: items/tier-7-space.md
      - Ores & raw materials: items/ores-raw-materials.md
      - Loot & rewards: items/loot-and-rewards.md
  - Reference:
      - Card & badge legend: reference/legend.md
      - Real-process glossary: reference/glossary.md
      - How this site is built: reference/how-this-site-is-built.md
  - Design Notes:
      - Recipe balance review: design/balance-review.md
      - Missing-chains roadmap: design/missing-chains.md
